# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
concurrency:
  group: firebase-hosting-live
  cancel-in-progress: true
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_VIVAH_VILLA_COLLECTION }}
      - name: Deploy to Firebase Hosting
        run: |
          set +e
          npx firebase-tools@latest deploy --only hosting --project vivah-villa-collection --non-interactive 2>&1 | tee firebase-deploy.log
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          if grep -q "is the current active version" firebase-deploy.log; then
            echo "Firebase reports this version is already live; treating deploy as successful."
            exit 0
          fi

          exit "$status"
