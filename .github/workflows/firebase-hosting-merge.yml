name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_VIVAH_VILLA_COLLECTION }}
      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@latest deploy --only hosting --project vivah-villa-collection --non-interactive
